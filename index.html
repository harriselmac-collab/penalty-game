<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>ركلات الترجيح — ماجد للتوقعات</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@600;700;800&family=Tajawal:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#08101f; --navy2:#0d1a30; --panel:#15294a; --panel2:#1d3a66;
  --line:#2f6fb0; --line2:#3f86d6; --ink:#06182e;
  --cyan:#3fc9ff; --cyan-d:#0f83c7; --cyan-dd:#0a5f93;
  --gold:#ffcf4a; --gold-d:#e79a15; --gold-dd:#a9660a;
  --green:#49e58c; --green-d:#17a457; --green-dd:#0d7a3e;
  --red:#ff5d6c; --red-d:#c62a44;
  --text:#eef5ff; --hint:#a4bede;
  --pitch:#0a3f2e;
  --e-back:cubic-bezier(.34,1.56,.64,1);
  --e-out:cubic-bezier(.22,1,.36,1);
  --fdisp:'Baloo Bhaijaan 2',-apple-system,'Segoe UI',Tahoma,sans-serif;
  --fbody:'Tajawal',-apple-system,'Segoe UI',Tahoma,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;color:var(--text);font-family:var(--fbody);
  background:radial-gradient(130% 80% at 50% -10%,#1a2f57 0%,#0b1730 42%,#070d1a 100%);
  overflow-x:hidden;-webkit-user-select:none;user-select:none}
#app{max-width:520px;margin:0 auto;position:relative;min-height:100%}

/* ============ SELECT / TOURNAMENT SCREEN ============ */
#app.sel{padding:16px 16px calc(24px + env(safe-area-inset-bottom));display:block}
.hero{position:relative;width:212px;margin:4px auto 2px;animation:drop .7s var(--e-back) both}
.hero img{width:100%;display:block;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5))}
.hero-t{position:absolute;bottom:11.5%;left:50%;transform:translateX(-50%);color:#ffe9a6;
  font-family:var(--fdisp);font-weight:800;font-size:19px;letter-spacing:.5px;white-space:nowrap;
  text-shadow:0 1px 0 #6e4700,0 2px 4px rgba(0,0,0,.7)}
.tagline{background:linear-gradient(180deg,#1e4c86,#12335f);border:1px solid #3673b6;
  border-radius:16px;padding:12px 14px;text-align:center;color:#dcebff;font-size:13.5px;line-height:1.6;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 4px 14px rgba(0,0,0,.3);
  margin:10px 4px 14px;animation:rise .6s var(--e-out) .1s both}
.seltitle{font-family:var(--fdisp);text-align:center;font-size:17px;font-weight:800;color:var(--gold);
  margin:4px 0 14px;text-shadow:0 2px 0 rgba(0,0,0,.35);letter-spacing:.3px}
.seltitle span{display:inline-block;animation:breathe 3s ease-in-out infinite}

.match{position:relative;border-radius:18px;overflow:hidden;margin:0 2px 15px;
  border:2px solid rgba(8,14,25,.65);
  box-shadow:0 7px 0 rgba(6,12,22,.55),0 12px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.16);
  transition:transform .25s var(--e-back);animation:rise .55s var(--e-out) both}
.match:active{transform:scale(.975) rotate(.4deg)}
.match::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,0) 30%,rgba(0,0,0,.28))}
.match .shine{content:'';position:absolute;top:-30%;bottom:-30%;left:-25%;width:26%;z-index:3;pointer-events:none;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.30),transparent);
  transform:rotate(8deg);animation:cardshine 6s ease-in-out infinite;will-change:transform}
.match-top{display:flex;align-items:stretch;min-height:108px}
.mteam{flex:1;position:relative;appearance:none;border:none;background:transparent;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:14px 8px;
  color:#fff;transition:transform .12s var(--e-back);z-index:2}
.mteam:active{transform:scale(.9)}
.mflag{font-size:38px;line-height:1;filter:drop-shadow(0 3px 3px rgba(0,0,0,.5));
  animation:wave 3.4s ease-in-out infinite;transform-origin:bottom center}
.mteam:nth-child(3) .mflag{animation-delay:-1.7s}
.mname{font-family:var(--fdisp);font-size:17px;font-weight:800;text-shadow:0 2px 3px rgba(0,0,0,.6)}
.mrate{display:flex;gap:2px;font-size:12px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))}
.mfollow{font-size:11.5px;font-weight:700;opacity:.92;text-shadow:0 1px 2px rgba(0,0,0,.6)}
.mvs{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
  width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--fdisp);font-weight:800;font-size:15px;color:#fff;
  background:radial-gradient(circle at 50% 35%,#28324a,#0e1626);
  border:2px solid rgba(255,255,255,.5);box-shadow:0 4px 10px rgba(0,0,0,.55),inset 0 2px 3px rgba(255,255,255,.25);
  animation:vspulse 2.2s ease-in-out infinite}
.match-foot{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;
  gap:8px;padding:9px 14px;background:linear-gradient(180deg,rgba(6,12,22,.5),rgba(6,12,22,.72))}
.diff{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#eaf3ff}
.diff-pips{display:flex;gap:3px}
.pip{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.22)}
.pip.on{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.reward-chip{position:relative;overflow:hidden;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:800;color:#ffe9a6;
  background:rgba(0,0,0,.32);border:1px solid rgba(255,207,74,.5);border-radius:20px;padding:4px 10px}
.reward-chip::after{content:'';position:absolute;inset:-4px auto;left:-40%;width:36%;
  background:linear-gradient(105deg,transparent,rgba(255,231,160,.5),transparent);
  animation:cardshine 3.6s ease-in-out infinite;pointer-events:none}
.reward-chip img{width:16px;height:16px}
.match .play-hint{position:absolute;z-index:3;top:9px;inset-inline-start:12px;font-size:11px;font-weight:800;
  color:#fff;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 9px;
  opacity:0;transform:translateY(-4px);transition:.2s}
.match:active .play-hint{opacity:1;transform:none}

/* ============ GAME SCREEN (immersive, ~70% stage) ============ */
#app.game{display:flex;flex-direction:column;height:100dvh;min-height:100dvh;padding:0;overflow:hidden}
@supports not (height:100dvh){#app.game{height:100vh;min-height:100vh}}

/* --- HUD: one cohesive panel (opponent → streak → best/lives), progress integrated --- */
.hud{flex:0 0 auto;padding:calc(8px + env(safe-area-inset-top)) 10px 0;animation:rise .5s var(--e-out) both}
.hudbar{background:linear-gradient(180deg,#1c3a66,#12274a 78%,#0f2140);border:1.5px solid #2c5f9c;
  border-radius:18px;padding:8px 12px 9px;
  box-shadow:0 5px 0 rgba(6,12,22,.5),0 9px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.12)}
.hud-row{display:flex;align-items:center;gap:10px}
.opp{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.opp .cf{font-size:26px;line-height:1;filter:drop-shadow(0 2px 2px rgba(0,0,0,.5))}
.opp .cl{display:block;font-size:9.5px;color:var(--hint);font-weight:700;letter-spacing:.4px}
.opp .cv{display:block;font-family:var(--fdisp);font-size:15px;font-weight:800;line-height:1.15;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.streak{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:0;position:relative;min-width:76px}
.streak .lab{font-size:9.5px;color:var(--hint);font-weight:800;letter-spacing:.6px}
.streak .val{font-family:var(--fdisp);font-size:36px;font-weight:800;line-height:.9;color:#fff;
  text-shadow:0 3px 0 rgba(6,12,22,.5),0 0 18px rgba(63,201,255,.4)}
.streak .val.bump{animation:bump .4s var(--e-back)}
.streak .flame{position:absolute;top:-3px;inset-inline-end:2px;font-size:15px;opacity:0;transition:.3s}
.streak.hot .flame{opacity:1;animation:flick .6s ease-in-out infinite}
.hud-right{flex:1;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.mini{display:flex;align-items:center;gap:6px}
.best-chip{display:flex;align-items:center;gap:4px;background:rgba(255,207,74,.13);
  border:1.5px solid rgba(255,207,74,.45);border-radius:12px;padding:3px 8px;font-size:12px;font-weight:800;color:#ffe1a0}
.lives{display:flex;gap:2px;font-size:14px}
.life{transition:transform .3s var(--e-back),opacity .3s}
.life.gone{opacity:.28;transform:scale(.7) rotate(-18deg)}
.mute{width:30px;height:30px;border-radius:10px;border:1.5px solid #2c5f9c;background:#0f2140;color:#fff;
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  transition:transform .2s var(--e-back)}
.mute:active{transform:scale(.85)}
/* progress toward reward — lives inside the same panel */
.prog{margin-top:8px;height:11px;border-radius:8px;background:rgba(6,12,22,.6);position:relative;overflow:hidden;
  border:1px solid rgba(63,111,176,.5)}
.prog-fill{position:absolute;inset:0 auto 0 0;width:0;border-radius:8px;
  background:linear-gradient(90deg,#17a457,#49e58c 60%,#bfffd8);transition:width .5s var(--e-out);will-change:width}
.prog-fill::after{content:'';position:absolute;inset:0;border-radius:8px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
  transform:translateX(-120%);animation:shimmer 2.4s linear infinite}
.prog-coin{position:absolute;top:50%;inset-inline-end:5px;transform:translateY(-50%);font-size:10.5px;font-weight:800;
  color:#ffe9a6;display:flex;align-items:center;gap:3px;z-index:2}
.prog-coin img{width:12px;height:12px}

/* --- STAGE (the ~70%) --- */
.stage{flex:1 1 auto;position:relative;margin:5px 4px 0;min-height:0}
.scene{position:absolute;inset:0;border-radius:18px;overflow:hidden;background-color:#06131f;
  background-repeat:no-repeat;background-position:50% 46%;background-size:cover;
  border:1.5px solid #244d80;box-shadow:0 10px 26px rgba(0,0,0,.45);
  will-change:transform;animation:rise .55s var(--e-out) .05s both}
.scene.shake{animation:shake .4s}
.scene.shake-sm{animation:shake .26s}
.scene.punch{animation:punch .3s var(--e-out)}
.scene.zoomk{animation:zoomk .28s var(--e-out)}
/* atmosphere layers (no blur filters — soft gradients only, cheap to composite) */
.sky{position:absolute;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(9,22,48,.55) 0%,rgba(9,22,48,0) 34%)}
.beam{position:absolute;top:-30%;width:64%;height:120%;z-index:1;pointer-events:none;mix-blend-mode:screen;
  background:linear-gradient(180deg,rgba(180,220,255,.22),rgba(180,220,255,.10) 30%,rgba(180,220,255,0) 62%);
  transform-origin:top center;opacity:.6;will-change:transform}
.beam.l{left:-8%;transform:rotate(14deg);animation:sway 7s ease-in-out infinite}
.beam.r{right:-8%;transform:rotate(-14deg);animation:sway 8s ease-in-out infinite reverse}
.bloom{position:absolute;top:-8%;width:120px;height:120px;z-index:1;pointer-events:none;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,240,.55),rgba(255,255,240,0) 62%);
  animation:pulseGlow 3.6s ease-in-out infinite;will-change:transform,opacity}
.bloom.l{left:2%}.bloom.r{right:2%}
/* stadium life: camera flashes in the stands + floating dust motes */
.cam{position:absolute;width:5px;height:5px;border-radius:50%;background:#fff;z-index:2;pointer-events:none;
  opacity:0;animation:twinkle 3.2s ease-in-out infinite;will-change:opacity,transform}
.mote{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(220,236,255,.55);z-index:2;
  pointer-events:none;animation:mote 9s linear infinite;will-change:transform,opacity}
.crowd{position:absolute;top:19%;left:0;right:0;height:14%;z-index:1;pointer-events:none;opacity:.4;
  background:radial-gradient(rgba(255,255,255,.5) 22%,transparent 23%) 0 0/7px 7px;
  mask:linear-gradient(180deg,#000,transparent);-webkit-mask:linear-gradient(180deg,#000,transparent);
  animation:crowd 2.6s steps(2) infinite}
.crowd.roar{animation:roar .7s ease}
.net{position:absolute;top:31%;left:18%;right:18%;height:26%;z-index:2;pointer-events:none;opacity:.14;
  background:repeating-linear-gradient(60deg,rgba(255,255,255,.6) 0 1px,transparent 1px 9px),
             repeating-linear-gradient(-60deg,rgba(255,255,255,.6) 0 1px,transparent 1px 9px);
  border-radius:8px 8px 0 0}
.net.hit{animation:netjit .4s ease}
.vig{position:absolute;inset:0;z-index:8;pointer-events:none;  /* gradient vignette: one cheap paint, no inset box-shadow */
  background:radial-gradient(115% 100% at 50% 42%,rgba(3,8,16,0) 58%,rgba(3,8,16,.55) 100%),
             linear-gradient(0deg,rgba(3,8,16,.42),rgba(3,8,16,0) 22%)}
.cflag{position:absolute;bottom:3%;font-size:26px;z-index:7;pointer-events:none;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));transform-origin:bottom center;animation:wave 3s ease-in-out infinite}
.cflag.l{inset-inline-start:4%}.cflag.r{inset-inline-end:4%;animation-delay:-1.5s}

#kp{position:absolute;left:50%;top:53%;width:29%;transform:translate(-50%,-50%);transform-origin:50% 100%;
  transition:transform .34s cubic-bezier(.3,.8,.3,1);filter:drop-shadow(0 6px 5px rgba(0,0,0,.55));
  z-index:4;will-change:transform}
#kp.idle{animation:kbreathe 2.8s ease-in-out infinite}  /* scales upper body only; feet stay planted */
#bl{position:absolute;left:50%;top:68%;width:13%;transform:translate(-50%,-50%);
  transition:transform .55s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 4px 4px rgba(0,0,0,.45));
  z-index:6;will-change:transform}
#bl.fly{filter:drop-shadow(0 4px 4px rgba(0,0,0,.45)) blur(.6px) brightness(1.08)}
#blTrail{position:absolute;left:50%;top:68%;width:13%;transform:translate(-50%,-50%);opacity:0;
  transition:transform .62s cubic-bezier(.4,0,.2,1),opacity .55s;z-index:5;pointer-events:none;will-change:transform,opacity}
.floaty{position:absolute;z-index:10;font-family:var(--fdisp);font-weight:800;font-size:19px;color:#ffe27a;
  text-shadow:0 2px 4px rgba(0,0,0,.7);pointer-events:none;opacity:0;transform:translate(-50%,-50%);will-change:transform,opacity}
.floaty.go{animation:floatUp 1s var(--e-out)}
/* ground contact shadows keep the keeper + ball visually planted on the grass */
.gsh{position:absolute;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;z-index:3;
  background:radial-gradient(ellipse at center,rgba(0,0,0,.55),rgba(0,0,0,0) 72%)}
#kpSh{left:50%;top:59.5%;width:18%;height:3.6%}
#blSh{left:50%;top:73%;width:10.5%;height:2.5%}
#kicker{position:absolute;left:40%;top:99%;width:21%;transform:translate(-50%,-100%) rotate(0);
  transform-origin:bottom center;transition:transform .24s ease;filter:drop-shadow(0 10px 9px rgba(0,0,0,.55));z-index:5}
#kicker.kick{transform:translate(-50%,-100%) rotate(-14deg)}
.reticle{position:absolute;width:10%;transform:translate(-50%,-50%);opacity:.4;z-index:3;pointer-events:none;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.45))}
.reticle.hot{opacity:1;animation:retPulse .5s ease}
.fx{position:absolute;inset:0;pointer-events:none;z-index:7;opacity:0;mix-blend-mode:screen}
.fx.go{animation:flash .5s ease-out}
.ring{position:absolute;width:16px;height:16px;border-radius:50%;border:5px solid #ffe27a;
  transform:translate(-50%,-50%) scale(.2);opacity:0;z-index:7;pointer-events:none}
.ring.go{animation:ring .55s ease-out}
.spark{position:absolute;width:9px;height:9px;border-radius:50%;z-index:8;pointer-events:none}
.msg{position:absolute;top:6%;left:50%;transform:translate(-50%,0);font-family:var(--fdisp);
  font-size:30px;font-weight:800;text-shadow:0 3px 10px rgba(0,0,0,.7);z-index:9;pointer-events:none;opacity:0}
.msg.show{animation:pop .9s ease}
.banner{position:absolute;top:11%;left:50%;width:70%;transform:translate(-50%,0) scale(.7);z-index:9;opacity:0;
  pointer-events:none;text-align:center}
.banner img{width:100%;display:block;filter:drop-shadow(0 5px 8px rgba(0,0,0,.55))}
.banner span{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-family:var(--fdisp);
  color:#fff;font-weight:800;font-size:24px;text-shadow:0 2px 4px rgba(0,0,0,.6);white-space:nowrap}
.banner.show{animation:bannerPop 1.05s ease}
.combo{position:absolute;top:34%;left:50%;transform:translate(-50%,-50%) scale(.4);z-index:10;opacity:0;
  font-family:var(--fdisp);font-weight:800;font-size:26px;color:#fff;white-space:nowrap;pointer-events:none;
  text-shadow:0 0 16px rgba(255,207,74,.9),0 3px 6px rgba(0,0,0,.6)}
.combo.show{animation:comboPop 1.1s var(--e-back)}

/* --- DOCK / CONTROLS: squash on press, elastic release, gloss sweep --- */
.dock{flex:0 0 auto;padding:9px 12px calc(12px + env(safe-area-inset-bottom));animation:rise .5s var(--e-out) .1s both}
.dock-hint{text-align:center;font-size:11.5px;color:var(--hint);font-weight:700;margin-bottom:7px}
.aim{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:10px;direction:ltr}
.aim button{position:relative;appearance:none;border:none;cursor:pointer;border-radius:18px;
  padding:12px 6px 11px;color:var(--ink);display:flex;flex-direction:column;align-items:center;gap:2px;
  border:2px solid rgba(6,12,22,.5);overflow:hidden;will-change:transform;
  transition:transform .3s var(--e-back),box-shadow .3s var(--e-back)}  /* elastic release */
.aim button::before{content:'';position:absolute;top:3px;left:9%;right:9%;height:44%;
  background:linear-gradient(180deg,rgba(255,255,255,.65),rgba(255,255,255,0));border-radius:0 0 60% 60%;pointer-events:none}
.aim button::after{content:'';position:absolute;top:-20%;bottom:-20%;left:-30%;width:34%;pointer-events:none;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.45),transparent);
  transform:translateX(0) rotate(8deg);animation:glosssweep 5.5s ease-in-out infinite}
.aim button .ar{font-size:27px;line-height:1;filter:drop-shadow(0 1px 0 rgba(255,255,255,.5))}
.aim button .lbl{font-family:var(--fdisp);font-size:14px;font-weight:800}
.aim button:active{transform:translateY(5px) scale(1.04,.9);transition-duration:.06s}  /* squash */
.aim .b-side{background:linear-gradient(180deg,#8ee3ff,#25a6e8);
  box-shadow:0 7px 0 var(--cyan-dd),0 10px 14px rgba(0,0,0,.4),0 0 14px rgba(63,201,255,.25)}
.aim .b-side:active{box-shadow:0 1px 0 var(--cyan-dd),0 2px 6px rgba(0,0,0,.4),0 0 20px rgba(63,201,255,.5)}
.aim .b-mid{background:linear-gradient(180deg,#ffe487,#f0a613);
  box-shadow:0 7px 0 var(--gold-dd),0 10px 14px rgba(0,0,0,.4),0 0 14px rgba(255,207,74,.28)}
.aim .b-mid:active{box-shadow:0 1px 0 var(--gold-dd),0 2px 6px rgba(0,0,0,.4),0 0 20px rgba(255,207,74,.55)}
.aim button::after{animation-delay:calc(var(--d,0)*1.2s)}

/* ============ REWARD / OVER SCREEN ============ */
.over{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;text-align:center;overflow:auto;
  padding:calc(18px + env(safe-area-inset-top)) 20px calc(18px + env(safe-area-inset-bottom));
  background:radial-gradient(120% 80% at 50% 0%,rgba(20,44,82,.97),rgba(6,13,26,.99))}
.over-title{font-family:var(--fdisp);font-size:26px;font-weight:800;color:var(--gold);margin-top:2px;
  text-shadow:0 3px 0 rgba(0,0,0,.4);animation:pop .7s var(--e-back) both}
.over-sub{color:var(--hint);font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;justify-content:center}
.stars{display:flex;gap:8px;font-size:34px}
.stars .st{opacity:.25;transform:scale(.6);transition:none}
.stars .st.on{opacity:1;animation:starPop .5s var(--e-back) both}
.stars .st.lit{color:var(--gold);filter:drop-shadow(0 0 10px rgba(255,207,74,.9))}
.scoreboard{position:relative;width:190px;margin:2px auto}
.scoreboard img{width:100%;display:block;filter:drop-shadow(0 6px 12px rgba(0,0,0,.5))}
.scoreboard .sv{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);font-family:var(--fdisp);
  font-size:52px;font-weight:800;color:var(--gold);text-shadow:0 3px 6px rgba(0,0,0,.7)}
.reward-line{font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px;justify-content:center;
  padding:10px 14px;border-radius:15px;background:rgba(255,207,74,.12);border:1px solid rgba(255,207,74,.4);color:#ffe9a6}
.reward-line.win{background:rgba(73,229,140,.14);border-color:rgba(73,229,140,.5);color:#c4ffd9;
  animation:winPulse 1.4s ease-in-out infinite}
.reward-line img{width:22px;height:22px}
.xpbar{width:100%;max-width:280px;height:14px;border-radius:10px;background:rgba(6,12,22,.6);position:relative;
  overflow:hidden;border:1.5px solid rgba(63,111,176,.5)}
.xpbar .xf{position:absolute;inset:0 auto 0 0;width:0;border-radius:10px;
  background:linear-gradient(90deg,#3f8fff,#7ad0ff);transition:width 1.1s var(--e-out);box-shadow:0 0 10px rgba(63,143,255,.6)}
.xplab{font-size:11px;color:var(--hint);font-weight:800;margin-top:-4px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;width:100%;max-width:300px}
.stat{background:linear-gradient(180deg,#173257,#0f2340);border:1.5px solid #2b5892;border-radius:14px;
  padding:9px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.stat .k{font-size:11px;color:var(--hint);font-weight:700}
.stat .v{font-family:var(--fdisp);font-size:20px;font-weight:800;color:#fff}
.over .row{display:flex;gap:11px;width:100%;max-width:320px;margin-top:2px}
.btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;
  border-radius:17px;padding:14px 14px;font-family:var(--fdisp);font-size:15px;font-weight:800;color:var(--ink);
  border:2px solid rgba(6,12,22,.5);background:linear-gradient(180deg,#8ee3ff,#25a6e8);
  box-shadow:0 6px 0 var(--cyan-dd),0 9px 14px rgba(0,0,0,.4);transition:transform .08s,box-shadow .08s}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--cyan-dd)}
.btn.gold{background:linear-gradient(180deg,#ffe487,#f0a613);box-shadow:0 6px 0 var(--gold-dd),0 9px 14px rgba(0,0,0,.4);color:var(--ink)}
.btn.gold:active{box-shadow:0 2px 0 var(--gold-dd)}
.btn.ghost{background:linear-gradient(180deg,#25456f,#183153);color:#dcebff;box-shadow:0 6px 0 #0c2038,0 9px 14px rgba(0,0,0,.4)}
.btn.ghost:active{box-shadow:0 2px 0 #0c2038}
.subhint{font-size:12px;color:var(--hint);font-weight:700}
.fly{position:fixed;z-index:60;pointer-events:none;width:22px;height:22px}

/* ============ KEYFRAMES ============ */
@keyframes drop{0%{opacity:0;transform:translateY(-26px) scale(.9)}100%{opacity:1;transform:none}}
@keyframes rise{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:none}}
@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.04)}}
@keyframes kbreathe{0%,100%{transform:translate(-50%,-50%) scaleY(1)}50%{transform:translate(-50%,-50%) scaleY(1.03)}}
@keyframes bob{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-5px)}}
@keyframes wave{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
@keyframes vspulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.09)}}
@keyframes breathe2{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,4px)}40%{transform:translate(6px,-4px)}60%{transform:translate(-5px,-2px)}80%{transform:translate(5px,3px)}}
@keyframes punch{0%{transform:scale(1)}30%{transform:scale(1.035)}100%{transform:scale(1)}}
@keyframes sway{0%,100%{transform:rotate(14deg) translateX(0)}50%{transform:rotate(9deg) translateX(6px)}}
@keyframes pulseGlow{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.95;transform:scale(1.14)}}
@keyframes crowd{0%{opacity:.42}100%{opacity:.6}}
@keyframes roar{0%{opacity:.5;transform:scale(1)}30%{opacity:.95;transform:scale(1.04)}100%{opacity:.5;transform:scale(1)}}
@keyframes netjit{0%,100%{transform:translateY(0) scaleY(1)}25%{transform:translateY(4px) scaleY(1.08)}60%{transform:translateY(-2px) scaleY(.97)}}
@keyframes retPulse{0%{transform:translate(-50%,-50%) scale(1)}40%{transform:translate(-50%,-50%) scale(1.35)}100%{transform:translate(-50%,-50%) scale(1)}}
@keyframes flash{0%{opacity:0}12%{opacity:1}100%{opacity:0}}
@keyframes ring{0%{transform:translate(-50%,-50%) scale(.2);opacity:1}100%{transform:translate(-50%,-50%) scale(14);opacity:0}}
@keyframes pop{0%{opacity:0;transform:translate(-50%,10px) scale(.7)}25%{opacity:1;transform:translate(-50%,0) scale(1.12)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-12px) scale(1)}}
@keyframes bannerPop{0%{opacity:0;transform:translate(-50%,8px) scale(.6)}18%{opacity:1;transform:translate(-50%,0) scale(1.1)}75%{opacity:1;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-12px) scale(1)}}
@keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-6deg)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(2deg)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-80px) scale(1)}}
@keyframes bump{0%{transform:scale(1)}45%{transform:scale(1.4);color:var(--gold)}100%{transform:scale(1)}}
@keyframes flick{0%,100%{transform:rotate(-6deg) scale(1)}50%{transform:rotate(6deg) scale(1.15)}}
@keyframes shimmer{0%{transform:translateX(-120%)}100%{transform:translateX(120%)}}
@keyframes starPop{0%{opacity:0;transform:scale(.2) rotate(-40deg)}60%{transform:scale(1.3) rotate(8deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes winPulse{0%,100%{box-shadow:0 0 0 rgba(73,229,140,.4)}50%{box-shadow:0 0 16px rgba(73,229,140,.6)}}
@keyframes zoomk{0%{transform:scale(1)}40%{transform:scale(1.014)}100%{transform:scale(1)}}
@keyframes twinkle{0%,88%,100%{opacity:0;transform:scale(.5)}92%{opacity:.95;transform:scale(1.3)}96%{opacity:.2;transform:scale(.8)}}
@keyframes mote{0%{transform:translateY(0);opacity:0}12%{opacity:.7}85%{opacity:.4}100%{transform:translateY(-46vh) translateX(14px);opacity:0}}
@keyframes floatUp{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}18%{opacity:1;transform:translate(-50%,-70%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-190%) scale(1)}}
@keyframes glosssweep{0%,55%{transform:translateX(0) rotate(8deg)}80%,100%{transform:translateX(480%) rotate(8deg)}}
@keyframes cardshine{0%,58%{transform:translateX(0) rotate(8deg)}86%,100%{transform:translateX(560%) rotate(8deg)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important}}
</style>
</head>
<body>
<div id="app" class="sel"></div>
<script>
(function(){
  var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
  if(tg){ try{ tg.ready(); tg.expand(); if(tg.setHeaderColor) tg.setHeaderColor('#08101f'); if(tg.setBackgroundColor) tg.setBackgroundColor('#08101f'); }catch(e){} }
  var ASSETS='assets/';
  var REWARD_AT=11; // must score MORE than 10 (server threshold) to earn a credit

  // Preload every sprite before gameplay (WebP: ~1/3 the PNG weight) — no
  // mid-shot fetches (the dive sprites used to load lazily on the first save).
  var IMGS={stadium:'stadium.webp',keeper:'keeper.webp',keeper_left:'keeper_left.webp',
    keeper_right:'keeper_right.webp',ball:'ball.webp',kicker:'kicker.webp',logo:'logo.webp',
    banner:'banner.webp',panel:'panel.webp',credit:'credit.webp',target:'target.webp'};
  var _pre={};
  for(var k in IMGS){ _pre[k]=new Image(); _pre[k].src=ASSETS+IMGS[k]; }
  function A(k){ return ASSETS+IMGS[k]; }

  // --- rivalries: [teamA, teamB]; g = global-fans number (cosmetic) ---
  var matches = [
    [{f:'🇳🇱',n:'هولندا',c:'#ea6d1a',g:8041177},{f:'🇦🇷',n:'الأرجنتين',c:'#6ca7dc',g:5598318}],
    [{f:'🇧🇷',n:'البرازيل',c:'#1f9e4a',g:7233901},{f:'🇩🇪',n:'ألمانيا',c:'#3a3f47',g:6120447}],
    [{f:'🇫🇷',n:'فرنسا',c:'#23449e',g:5904122},{f:'🇪🇸',n:'إسبانيا',c:'#cc1b2c',g:4877650}],
    [{f:'🇵🇹',n:'البرتغال',c:'#b02323',g:4512330},{f:'🇲🇦',n:'المغرب',c:'#11774a',g:3998210}],
    [{f:'🇸🇳',n:'السنغال',c:'#13863c',g:3598518},{f:'🇶🇦',n:'قطر',c:'#7a1b3a',g:2854393}],
    [{f:'🇸🇦',n:'السعودية',c:'#1b7a44',g:3104560},{f:'🇪🇬',n:'مصر',c:'#cc2233',g:2640880}]
  ];
  var MAXG=8041177;
  // ---- CORE STATE (unchanged mechanics) ----
  var team=null, opp=null, score=0, best=0, busy=false, muted=false, audioCtx=null, lastImpact=null;
  // ---- display-only stats (do not affect logic) ----
  var kicks=0, coins=0, milestone=0, raf=0, particles=[];

  function fmt(n){ return n.toLocaleString('en-US'); }
  function starsFor(g){ var r=Math.max(3,Math.min(5,Math.round(g/MAXG*5)+1)); return r; }
  function powerFor(g){ return Math.round(72+ g/MAXG*26); }
  var app=document.getElementById('app');

  /* ---------- audio ---------- */
  function tone(freq,dur,type,vol){ if(muted) return;
    try{ audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
      var o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=type||'square'; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(vol||0.07,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
      o.start(); o.stop(audioCtx.currentTime+dur);
    }catch(e){}
  }
  function sfx(k){ if(k==='shoot'){tone(280,0.12,'square')} else if(k==='click'){tone(520,0.05,'square',0.05)}
    else if(k==='save'){tone(150,0.28,'sawtooth',0.09)} else if(k==='coin'){tone(880,0.07,'triangle',0.08);setTimeout(function(){tone(1180,0.09,'triangle',0.07)},70)}
    else if(k==='goal'){tone(523,0.12);setTimeout(function(){tone(659,0.12)},90);setTimeout(function(){tone(784,0.18)},190)} }
  function buzz(t){ if(tg&&tg.HapticFeedback){ try{ tg.HapticFeedback.impactOccurred(t||'medium'); }catch(e){} } }
  window.toggleMute=function(e){ if(e){e.stopPropagation();} muted=!muted; var m=document.getElementById('mute'); if(m) m.textContent=muted?'🔇':'🔊'; };

  /* ---------- pooled particle engine ----------
     ONE rAF loop drives every particle; positions via transform only (no
     layout), elements recycled through a free pool instead of create/remove. */
  var pool=[], live=[], engineOn=false;
  function pGet(parent){ var el=pool.pop();
    if(!el){ el=document.createElement('div'); el.className='spark'; }
    if(el.parentNode!==parent) parent.appendChild(el);
    el.style.opacity='1'; el.style.display='block'; return el;
  }
  function pTick(){
    for(var i=live.length-1;i>=0;i--){ var p=live[i]; p.life++;
      p.vy+=p.grav; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      var f=1-p.life/p.max;
      p.el.style.transform='translate('+p.x+'px,'+p.y+'px) rotate('+p.rot+'deg)';
      if(f<0.4) p.el.style.opacity=Math.max(0,f/0.4);
      if(p.life>=p.max){ p.el.style.display='none'; pool.push(p.el); live.splice(i,1); }
    }
    if(live.length){ requestAnimationFrame(pTick); } else { engineOn=false; }
  }
  function pSpawn(parent,n,opts){
    for(var i=0;i<n;i++){
      var el=pGet(parent), ang=opts.ang!==undefined?opts.ang+(Math.random()-.5)*opts.spread:Math.random()*6.28;
      var sp=opts.sp[0]+Math.random()*(opts.sp[1]-opts.sp[0]);
      var sz=opts.sz[0]+Math.random()*(opts.sz[1]-opts.sz[0]);
      el.style.left='0'; el.style.top='0';
      el.style.width=sz+'px'; el.style.height=(sz*(opts.flat?0.62:1))+'px';
      el.style.borderRadius=opts.flat?'2px':'50%';
      el.style.background=opts.cols[i%opts.cols.length];
      live.push({el:el,x:opts.x,y:opts.y,vx:Math.cos(ang)*sp+(opts.vx||0),vy:Math.sin(ang)*sp+(opts.vy||0),
        grav:opts.grav,rot:Math.random()*360,vr:(Math.random()-.5)*(opts.flat?16:6),life:0,max:opts.max});
    }
    if(!engineOn){ engineOn=true; requestAnimationFrame(pTick); }
  }
  var confettiHost=null;
  function confetti(){ if(!confettiHost||!confettiHost.parentNode){ confettiHost=document.createElement('div');
      confettiHost.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:59;overflow:hidden';
      document.body.appendChild(confettiHost); }
    for(var i=0;i<8;i++){ pSpawn(confettiHost,8,{x:Math.random()*window.innerWidth,y:-20,
      cols:['#ffcf4a','#3fc9ff','#49e58c','#ff5d6c','#b18bff','#fff'],flat:true,
      ang:1.57,spread:.6,sp:[2,5],vy:1.5,grav:.06,sz:[6,14],max:110}); }
  }
  function sparkBurst(x,y){ var scene=document.getElementById('scene'); if(!scene) return;
    pSpawn(scene,14,{x:x,y:y,cols:['#ffe27a','#fff','#3fc9ff','#49e58c'],sp:[2,6],vy:-2,grav:.18,sz:[6,10],max:26});
  }
  function grassKick(x,y){ var scene=document.getElementById('scene'); if(!scene) return;
    pSpawn(scene,8,{x:x,y:y,cols:['#2f9e4a','#5ec97a','#cfe8d5'],ang:-1.57,spread:1.4,sp:[1.5,3.5],grav:.22,sz:[3,6],max:22});
  }
  function dustBurst(x,y){ var scene=document.getElementById('scene'); if(!scene) return;
    pSpawn(scene,10,{x:x,y:y,cols:['#9a8f7a','#c9c0ae','#efe9db'],ang:-1.57,spread:2.2,sp:[1,3],grav:.12,sz:[4,8],max:30});
  }
  function coinBurst(){ var hud=document.getElementById('coinTarget'); var scene=document.getElementById('scene');
    var tx=hud?hud.getBoundingClientRect():{left:window.innerWidth/2,top:40}; var sc=scene?scene.getBoundingClientRect():{left:0,top:0,width:0,height:0};
    for(var i=0;i<8;i++){ (function(i){ var img=document.createElement('img'); img.className='fly'; img.src=A('credit');
      var sx=sc.left+sc.width*0.5+(Math.random()-0.5)*80, sy=sc.top+sc.height*0.5+(Math.random()-0.5)*60;
      img.style.left=sx+'px'; img.style.top=sy+'px'; document.body.appendChild(img);
      setTimeout(function(){ img.style.transition='left .6s cubic-bezier(.5,0,.4,1),top .6s cubic-bezier(.5,0,.4,1),opacity .6s';
        img.style.left=(tx.left||sx)+'px'; img.style.top=(tx.top||sy)+'px'; img.style.opacity='0'; },20+i*45);
      setTimeout(function(){ img.remove(); },760+i*45);
    })(i); }
    sfx('coin');
  }

  /* ---------- SELECT / TOURNAMENT ---------- */
  function ratePips(g){ var d=Math.max(1,Math.min(5,Math.round(g/MAXG*5))); var h='';
    for(var i=0;i<5;i++){ h+='<span class="pip'+(i<d?' on':'')+'"></span>'; } return h; }
  function starStr(n){ return '★'.repeat(n)+'☆'.repeat(5-n); }

  function selectScreen(){
    stopLoop(); hideMain(); app.className='sel'; team=null; opp=null; score=0;
    var html='<div class="hero"><img src="'+A('logo')+'" alt=""><span class="hero-t">ركلات الترجيح</span></div>'
      +'<div class="tagline">🧤 سجّل أطول سلسلة أهداف متتالية! تبدأ سهلة ويزداد الحارس ذكاءً مع كل هدف. تخطَّ <b style="color:#ffe9a6">١٠</b> أهداف واربح رصيد توقّع مجاني.</div>'
      +'<div class="seltitle"><span>🏆 اختر مباراتك</span></div>';
    matches.forEach(function(m,mi){
      var a=m[0], b=m[1], diff=Math.max(1,Math.min(5,mi+1));
      html+='<div class="match" data-mi="'+mi+'" style="animation-delay:'+(0.05+mi*0.06).toFixed(2)+'s;background:linear-gradient(100deg,'+b.c+' 0 44%,'+a.c+' 56% 100%)">'
        +'<span class="play-hint">▶ إلعب</span><span class="shine" style="animation-delay:'+(mi*0.9).toFixed(1)+'s"></span>'
        +'<div class="match-top">'
          +'<button class="mteam" data-mi="'+mi+'" data-si="0"><span class="mflag">'+a.f+'</span><span class="mname">'+a.n+'</span><span class="mrate">'+starStr(starsFor(a.g))+'</span><span class="mfollow">👥 '+fmt(a.g)+'</span></button>'
          +'<span class="mvs">VS</span>'
          +'<button class="mteam" data-mi="'+mi+'" data-si="1"><span class="mflag">'+b.f+'</span><span class="mname">'+b.n+'</span><span class="mrate">'+starStr(starsFor(b.g))+'</span><span class="mfollow">👥 '+fmt(b.g)+'</span></button>'
        +'</div>'
        +'<div class="match-foot">'
          +'<span class="diff">الصعوبة <span class="diff-pips">'+ratePips((a.g+b.g)/2)+'</span></span>'
          +'<span class="reward-chip"><img src="'+A('credit')+'" alt="">رصيد مجاني</span>'
        +'</div>'
      +'</div>';
    });
    app.innerHTML=html;
    Array.prototype.forEach.call(app.querySelectorAll('.mteam'),function(btn){
      btn.onclick=function(){ sfx('click'); buzz('light'); var m=matches[+btn.getAttribute('data-mi')], si=+btn.getAttribute('data-si');
        team=m[si]; opp=m[1-si]; score=0; gameScreen(); };
    });
  }

  /* ---------- GAME HUD + SCENE ---------- */
  function hudHTML(){
    var pct=Math.min(100,score/REWARD_AT*100);
    return '<div class="hud"><div class="hudbar">'
      +'<div class="hud-row">'
        +'<div class="opp"><span class="cf">'+opp.f+'</span><span style="min-width:0"><span class="cl">الخصم</span><span class="cv">'+opp.n+'</span></span></div>'
        +'<div class="streak" id="streak"><span class="lab">السلسلة</span><span class="val" id="sc">'+score+'</span><span class="flame">🔥</span></div>'
        +'<div class="hud-right">'
          +'<div class="mini"><span class="best-chip">🏅 <span id="bs">'+best+'</span></span>'
          +'<button class="mute" id="mute" onclick="toggleMute(event)">'+(muted?'🔇':'🔊')+'</button></div>'
          +'<div class="lives" id="lives"><span class="life">❤️</span></div>'
        +'</div>'
      +'</div>'
      +'<div class="prog"><div class="prog-fill" id="prog" style="width:'+pct+'%"></div>'
        +'<span class="prog-coin" id="coinTarget"><img src="'+A('credit')+'" alt="">'+REWARD_AT+'</span></div>'
      +'</div></div>';
  }
  function sceneHTML(){
    var cams='', motes='';
    for(var i=0;i<6;i++){ cams+='<span class="cam" style="left:'+(8+Math.random()*84)+'%;top:'+(20+Math.random()*13)+'%;animation-delay:'+(Math.random()*3.2).toFixed(2)+'s"></span>'; }
    for(var j=0;j<4;j++){ motes+='<span class="mote" style="left:'+(10+j*24)+'%;bottom:'+(4+Math.random()*18)+'%;animation-delay:'+(j*2.3)+'s"></span>'; }
    return '<div class="stage"><div class="scene" id="scene" style="background-image:url('+A('stadium')+')">'
      +'<div class="sky"></div>'
      +'<div class="beam l"></div><div class="beam r"></div>'
      +'<div class="bloom l"></div><div class="bloom r"></div>'
      +'<div class="crowd" id="crowd"></div>'
      +cams
      +'<div class="net" id="net"></div>'
      +'<div class="fx" id="fx"></div><div class="ring" id="ring"></div>'
      +'<img class="reticle" id="rL" style="left:30%;top:45%" src="'+A('target')+'" alt="">'
      +'<img class="reticle" id="rC" style="left:50%;top:40%" src="'+A('target')+'" alt="">'
      +'<img class="reticle" id="rR" style="left:70%;top:45%" src="'+A('target')+'" alt="">'
      +'<div class="gsh" id="kpSh"></div>'
      +'<img id="kp" class="idle" src="'+A('keeper')+'" alt="">'
      +'<img id="kicker" src="'+A('kicker')+'" alt="">'
      +'<div class="gsh" id="blSh"></div>'
      +'<img id="blTrail" src="'+A('ball')+'" alt="">'
      +'<img id="bl" src="'+A('ball')+'" alt="">'
      +motes
      +'<span class="cflag l">'+team.f+'</span><span class="cflag r">'+opp.f+'</span>'
      +'<div class="floaty" id="floaty"></div>'
      +'<div class="combo" id="combo"></div><div class="msg" id="msg"></div>'
      +'<div class="banner" id="banner"><img src="'+A('banner')+'" alt=""><span id="bannerTxt"></span></div>'
      +'<div class="vig"></div>'
      +'</div></div>';
  }
  function gameScreen(){
    stopLoop(); hideMain(); busy=false; kicks=0; coins=0; milestone=0; app.className='game';
    app.innerHTML=hudHTML()+sceneHTML()
      +'<div class="dock"><div class="dock-hint">⚽ اختر زاوية التسديد</div>'
      +'<div class="aim">'
      +'<button class="b-side" data-d="L" style="--d:0"><span class="ar">◄</span><span class="lbl">يسار</span></button>'
      +'<button class="b-mid" data-d="C" style="--d:1"><span class="ar">▲</span><span class="lbl">وسط</span></button>'
      +'<button class="b-side" data-d="R" style="--d:2"><span class="ar">►</span><span class="lbl">يمين</span></button>'
      +'</div></div>';
    Array.prototype.forEach.call(app.querySelectorAll('.aim button'),function(b){
      b.onclick=function(){ shoot(b.getAttribute('data-d')); };
    });
    startLoop();
  }

  function setMsg(t,c){ var m=document.getElementById('msg'); if(!m) return; m.textContent=t; m.style.color=c||'#fff'; m.classList.remove('show'); void m.offsetWidth; m.classList.add('show'); }
  function showBanner(t){ var b=document.getElementById('banner'), s=document.getElementById('bannerTxt'); if(!b||!s) return; s.textContent=t; b.classList.remove('show'); void b.offsetWidth; b.classList.add('show'); }
  function showCombo(t){ var c=document.getElementById('combo'); if(!c) return; c.textContent=t; c.classList.remove('show'); void c.offsetWidth; c.classList.add('show'); }
  function pulseReticle(dir){ var r=document.getElementById('r'+dir); if(!r) return; r.classList.remove('hot'); void r.offsetWidth; r.classList.add('hot'); setTimeout(function(){ r.classList.remove('hot'); }, 520); }

  /* ================= SHOOT — mechanics UNCHANGED ================= */
  function shoot(dir){
    if(busy||!team) return; busy=true; sfx('shoot'); buzz('light');
    var scene=document.getElementById('scene'), kp=document.getElementById('kp'), bl=document.getElementById('bl'),
        trail=document.getElementById('blTrail'), kicker=document.getElementById('kicker');
    var W=scene.clientWidth, H=scene.clientHeight;
    kicks++;
    if(kp) kp.classList.remove('idle'); if(bl) bl.classList.remove('idle');
    if(kicker){ kicker.classList.add('kick'); setTimeout(function(){kicker.classList.remove('kick');},260); }
    pulseReticle(dir);
    scene.classList.remove('zoomk'); void scene.offsetWidth; scene.classList.add('zoomk');
    var T={L:{x:0.30,y:0.45},C:{x:0.50,y:0.40},R:{x:0.70,y:0.45}}, base={x:0.50,y:0.68};
    var t=T[dir];
    var flight='translate(calc(-50% + '+((t.x-base.x)*W)+'px), calc(-50% + '+((t.y-base.y)*H)+'px)) scale(0.42)';
    setTimeout(function(){
      bl.classList.add('fly'); bl.style.transform=flight;
      if(trail){ trail.style.opacity='.35'; trail.style.transform=flight; }   // lagging ghost = speed trail
      grassKick(base.x*W, base.y*H+6);                                        // turf spray at the strike
    },120);
    // keeper: brief anticipation crouch, then the dive (read logic unchanged)
    var readProb=Math.min(0.10+score*0.05, 0.82), kd;
    if(Math.random()<readProb){ kd=dir; } else { var o=['L','C','R'].filter(function(d){return d!==dir;}); kd=o[Math.floor(Math.random()*o.length)]; }
    kp.style.transform='translate(-50%,-48.5%) scaleY(.955)';
    setTimeout(function(){
      if(kd==='L'){ kp.src=A('keeper_left'); kp.style.transform='translate(calc(-50% - '+(0.20*W)+'px), -52%)'; }
      else if(kd==='R'){ kp.src=A('keeper_right'); kp.style.transform='translate(calc(-50% + '+(0.20*W)+'px), -52%)'; }
      else { kp.style.transform='translate(-50%, calc(-50% - '+(0.08*H)+'px))'; }
    },90);
    lastImpact={x:t.x*W, y:t.y*H};
    setTimeout(function(){ resolve(kd===dir); }, 680);
  }

  /* ================= RESOLVE — scoring UNCHANGED, juice added ================= */
  function resolve(saved){
    var scene=document.getElementById('scene');
    if(saved){
      showBanner('تصدّى! 🧤'); sfx('save'); buzz('heavy');
      var lv=document.getElementById('lives'); if(lv){ var h=lv.querySelector('.life'); if(h) h.classList.add('gone'); }
      var crowd=document.getElementById('crowd'); if(crowd){ crowd.style.opacity='.25'; }
      var fx=document.getElementById('fx');           // red save flash + dust where the keeper lands
      if(fx){ fx.style.background='radial-gradient(circle at 50% 45%, rgba(255,70,80,.5), rgba(255,70,80,0) 55%)';
        fx.classList.remove('go'); void fx.offsetWidth; fx.classList.add('go'); }
      if(scene){ dustBurst(scene.clientWidth*0.5, scene.clientHeight*0.56);
        scene.classList.add('shake'); setTimeout(function(){scene.classList.remove('shake');},420); }
      if(score>best){ best=score; }
      setTimeout(over,1050);
    } else {
      score++; if(score>best){ best=score; }
      showBanner('هدف! ⚽'); sfx('goal'); buzz('medium'); goalImpact();
      var sc=document.getElementById('sc'); if(sc){ sc.textContent=score; sc.classList.remove('bump'); void sc.offsetWidth; sc.classList.add('bump'); }
      var bs=document.getElementById('bs'); if(bs) bs.textContent=best;
      var st=document.getElementById('streak'); if(st){ if(score>=3) st.classList.add('hot'); }
      var prog=document.getElementById('prog'); if(prog) prog.style.width=Math.min(100,score/REWARD_AT*100)+'%';
      coins+=10; comboCheck();
      var fl=document.getElementById('floaty');       // floating "+10" at the impact point
      if(fl&&lastImpact){ fl.textContent='+10 ⭐'; fl.style.left=lastImpact.x+'px'; fl.style.top=lastImpact.y+'px';
        fl.classList.remove('go'); void fl.offsetWidth; fl.classList.add('go'); }
      if(score>=5){ confetti(); }
      if(score===REWARD_AT){ coinBurst(); showCombo('🎁 رصيد مجاني!'); }
      setTimeout(nextKick,940);
    }
  }
  function comboCheck(){
    var labels={3:'كومبو ×٣ ⚡',5:'ملتهب! 🔥',7:'لا يُوقَف! 💥',10:'أسطوري! 👑'};
    if(labels[score]){ showCombo(labels[score]); buzz('light'); }
  }
  function goalImpact(){
    var scene=document.getElementById('scene'), ring=document.getElementById('ring'), fx=document.getElementById('fx'),
        net=document.getElementById('net'), crowd=document.getElementById('crowd');
    var p=lastImpact||{x:0,y:0};
    if(ring){ ring.style.left=p.x+'px'; ring.style.top=p.y+'px'; ring.classList.remove('go'); void ring.offsetWidth; ring.classList.add('go'); }
    if(fx&&scene){ var px=p.x/scene.clientWidth*100, py=p.y/scene.clientHeight*100;
      fx.style.background='radial-gradient(circle at '+px+'% '+py+'%, rgba(255,255,255,.95), rgba(255,255,255,0) 32%)';
      fx.classList.remove('go'); void fx.offsetWidth; fx.classList.add('go'); }
    if(net){ net.classList.remove('hit'); void net.offsetWidth; net.classList.add('hit'); }
    if(crowd){ crowd.classList.remove('roar'); void crowd.offsetWidth; crowd.classList.add('roar'); }
    sparkBurst(p.x,p.y);
    if(scene){ scene.classList.remove('punch'); void scene.offsetWidth; scene.classList.add('punch');
      scene.classList.remove('shake-sm'); setTimeout(function(){ scene.classList.add('shake-sm'); },20); setTimeout(function(){scene.classList.remove('shake-sm');},320); }
  }
  function nextKick(){
    var kp=document.getElementById('kp'), bl=document.getElementById('bl'), trail=document.getElementById('blTrail');
    if(kp){ kp.src=A('keeper'); kp.style.transform='translate(-50%,-50%)'; kp.classList.add('idle'); }
    if(bl){ bl.classList.remove('fly'); bl.style.transition='none'; bl.style.transform='translate(-50%,-50%)'; void bl.offsetWidth; bl.style.transition=''; }  /* ball rests still on the spot — no idle bounce */
    if(trail){ trail.style.transition='none'; trail.style.opacity='0'; trail.style.transform='translate(-50%,-50%)'; void trail.offsetWidth; trail.style.transition=''; }
    busy=false;
  }

  /* ---------- idle ambient loop (light) ---------- */
  function startLoop(){ /* CSS drives idle motion; loop reserved for future particles */ }
  function stopLoop(){ if(raf){ cancelAnimationFrame(raf); raf=0; } }

  /* ================= REWARD / OVER SCREEN ================= */
  function over(){
    stopLoop();
    var win = best>=REWARD_AT;
    var starN = best>=REWARD_AT?5 : best>=8?4 : best>=5?3 : best>=3?2 : best>=1?1:0;
    var acc = kicks>0 ? Math.round(best/ kicks*100) : 0;
    if(win){ setTimeout(confetti,120); }
    var title = win?'بطولة مذهلة! 🏆' : best>=5?'أداء رائع! 👏' : 'انتهت الجولة';
    var starsHTML='';
    for(var i=0;i<5;i++){ starsHTML+='<span class="st'+(i<starN?' lit':'')+'" data-i="'+i+'">★</span>'; }
    var html='<div class="over" id="over">'
      +'<div class="over-title">'+title+'</div>'
      +'<div class="over-sub">'+team.f+' '+team.n+' <span style="opacity:.6">🆚</span> '+opp.f+' '+opp.n+'</div>'
      +'<div class="stars" id="stars">'+starsHTML+'</div>'
      +'<div class="scoreboard"><img src="'+A('panel')+'" alt=""><span class="sv" id="finalScore">0</span></div>'
      +'<div class="reward-line'+(win?' win':'')+'"><img src="'+A('credit')+'" alt="">'
        +(win?'ربحت رصيد توقّع مجاني! 🎁':'سجّل أكثر من ١٠ لتربح رصيداً')+'</div>'
      +'<div class="xpbar"><div class="xf" id="xf"></div></div>'
      +'<div class="xplab">الخبرة <span id="xpv">0</span> XP</div>'
      +'<div class="stats">'
        +'<div class="stat"><span class="k">أفضل سلسلة</span><span class="v" id="stBest">0</span></div>'
        +'<div class="stat"><span class="k">التسديدات</span><span class="v">'+kicks+'</span></div>'
        +'<div class="stat"><span class="k">الدقة</span><span class="v">'+acc+'%</span></div>'
        +'<div class="stat"><span class="k">النقاط</span><span class="v" id="stCoins">0</span></div>'
      +'</div>'
      +'<div class="row">'
        +'<button class="btn gold" id="again">🔁 إلعب مجدداً</button>'
        +'<button class="btn ghost" id="chg">🔀 غيّر</button>'
      +'</div>'
      + (tg?'<div class="subhint">اضغط «استلم رصيدك» بالأسفل لإرسال نتيجتك 🎁</div>'
           :'<button class="btn" id="sub" style="flex:none;margin-top:6px">أرسل النتيجة 🎁</button>')
      +'</div>';
    // Overlay the whole app (not just the scene) so HUD + controls are covered.
    // Appended to #app so gameScreen()/selectScreen()'s innerHTML reset clears it.
    app.insertAdjacentHTML('beforeend',html);
    // staggered star pop
    var sts=document.querySelectorAll('#stars .st');
    for(var j=0;j<starN;j++){ (function(j){ setTimeout(function(){ sts[j].classList.add('on'); sfx('coin'); },260+j*130); })(j); }
    countUp('finalScore',best,700); countUp('stBest',best,700);
    countUp('stCoins',coins,900);
    var xp=Math.min(100, best/REWARD_AT*100); setTimeout(function(){ var xf=document.getElementById('xf'); if(xf) xf.style.width=xp+'%'; },200);
    countUp('xpv',best*10,1100);
    document.getElementById('again').onclick=function(){ sfx('click'); buzz('light'); score=0; gameScreen(); };
    document.getElementById('chg').onclick=function(){ sfx('click'); selectScreen(); };
    var sub=document.getElementById('sub'); if(sub){ sub.onclick=submit; }
    showMain();
  }
  function countUp(id,to,dur){ var el=document.getElementById(id); if(!el) return; var start=performance.now();
    (function step(now){ var p=Math.min(1,(now-start)/dur); el.textContent=Math.round(to*(1-Math.pow(1-p,3)));
      if(p<1){ requestAnimationFrame(step); } })(start);
  }

  /* ---------- submit (Telegram contract — UNCHANGED) ---------- */
  function submit(){ if(tg){ try{ tg.sendData(JSON.stringify({score:best,team:team?team.n:''})); tg.close(); }catch(e){} } }
  function showMain(){ if(tg&&tg.MainButton){ tg.MainButton.setText('استلم رصيدك 🎁'); tg.MainButton.onClick(submit); tg.MainButton.show(); } }
  function hideMain(){ if(tg&&tg.MainButton){ tg.MainButton.hide(); tg.MainButton.offClick(submit); } }

  selectScreen();
})();
</script>
</body>
</html>
