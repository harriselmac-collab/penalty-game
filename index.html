<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>ركلات الترجيح — ماجد للتوقعات</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{--bg:#0b1424;--card:#13233f;--card2:#1b3257;--line:#2b62a8;--cyan:#37c6ff;--gold:#ffc23d;--text:#eaf2ff;--hint:#9fb6d6;--green:#3fe08a;--red:#ff6b6b}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:radial-gradient(120% 90% at 50% 0%,#16294a 0%,#0b1424 70%);color:var(--text);font-family:-apple-system,'Segoe UI',Tahoma,Arial,sans-serif;overflow-x:hidden}
  #app{max-width:480px;margin:0 auto;padding:14px 18px 22px;min-height:100vh}
  .title{text-align:center;font-size:18px;font-weight:700;letter-spacing:.3px;margin:6px 0 10px;color:var(--text)}
  .logo{position:relative;width:208px;margin:2px auto 8px}
  .logo img{width:100%;display:block;filter:drop-shadow(0 4px 10px rgba(0,0,0,.45))}
  .logo-title{position:absolute;bottom:8.5%;left:50%;transform:translate(-50%,0);color:#ffe27a;font-weight:800;font-size:18px;text-shadow:0 1px 2px rgba(0,0,0,.7),0 0 1px #7a5200;white-space:nowrap;letter-spacing:.5px}
  .title b{color:var(--gold)}
  /* HUD */
  .hud{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  .pill{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:14px;padding:7px 12px;display:flex;align-items:center;gap:7px;font-size:14px;font-weight:600;box-shadow:0 2px 0 rgba(0,0,0,.25)}
  .pill .lab{color:var(--hint);font-size:11px;font-weight:600}
  .score-pill{font-size:22px;color:var(--cyan);min-width:54px;justify-content:center}
  .mute{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  /* Scene */
  .scene{position:relative;width:100%;aspect-ratio:3/2;border-radius:18px;overflow:hidden;background-color:#0a1a30;background-repeat:no-repeat;background-position:50% 64%;background-size:150%;border:1px solid var(--line);box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .scene.shake{animation:shake .4s}
  .scene.shake-sm{animation:shake .28s}
  @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,3px)}40%{transform:translate(5px,-3px)}60%{transform:translate(-4px,-2px)}80%{transform:translate(4px,2px)}}
  #kp{position:absolute;left:50%;top:47%;width:29%;transform:translate(-50%,-50%);transition:transform .42s cubic-bezier(.3,.8,.3,1);filter:drop-shadow(0 4px 3px rgba(0,0,0,.5));z-index:3}
  #bl{position:absolute;left:50%;top:78%;width:12%;transform:translate(-50%,-50%);transition:transform .55s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 5px 5px rgba(0,0,0,.5));z-index:4}
  .reticle{position:absolute;width:8.5%;transform:translate(-50%,-50%);opacity:.42;z-index:2;pointer-events:none;filter:drop-shadow(0 2px 2px rgba(0,0,0,.4))}
  .reticle.hot{opacity:.95;animation:retPulse .5s ease}
  @keyframes retPulse{0%{transform:translate(-50%,-50%) scale(1)}40%{transform:translate(-50%,-50%) scale(1.35)}100%{transform:translate(-50%,-50%) scale(1)}}
  .banner{position:absolute;top:5%;left:50%;width:64%;transform:translate(-50%,0) scale(.7);z-index:9;opacity:0;pointer-events:none;text-align:center}
  .banner img{width:100%;display:block;filter:drop-shadow(0 4px 6px rgba(0,0,0,.5))}
  .banner span{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);color:#fff;font-weight:800;font-size:23px;text-shadow:0 2px 3px rgba(0,0,0,.55);white-space:nowrap}
  .banner.show{animation:bannerPop 1.05s ease}
  @keyframes bannerPop{0%{opacity:0;transform:translate(-50%,8px) scale(.6)}18%{opacity:1;transform:translate(-50%,0) scale(1.1)}75%{opacity:1;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-10px) scale(1)}}
  #kicker{position:absolute;left:36%;top:94%;width:17%;transform:translate(-50%,-100%) rotate(0deg);transform-origin:bottom center;transition:transform .25s ease;filter:drop-shadow(0 8px 8px rgba(0,0,0,.5));z-index:5}
  #kicker.kick{transform:translate(-50%,-100%) rotate(-13deg)}
  .fx{position:absolute;inset:0;pointer-events:none;z-index:6;opacity:0;mix-blend-mode:screen}
  .fx.go{animation:flash .5s ease-out}
  @keyframes flash{0%{opacity:0}12%{opacity:1}100%{opacity:0}}
  .ring{position:absolute;width:16px;height:16px;border-radius:50%;border:5px solid #ffe27a;transform:translate(-50%,-50%) scale(.2);opacity:0;z-index:7;pointer-events:none}
  .ring.go{animation:ring .55s ease-out}
  @keyframes ring{0%{transform:translate(-50%,-50%) scale(.2);opacity:1}100%{transform:translate(-50%,-50%) scale(13);opacity:0}}
  .msg{position:absolute;top:7%;left:50%;transform:translate(-50%,0);font-size:28px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.6);z-index:9;pointer-events:none;opacity:0}
  .msg.show{animation:pop .9s ease}
  @keyframes pop{0%{opacity:0;transform:translate(-50%,10px) scale(.7)}25%{opacity:1;transform:translate(-50%,0) scale(1.1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-12px) scale(1)}}
  /* Controls */
  .aim{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:14px;direction:ltr}
  .aim button{position:relative;appearance:none;border:none;cursor:pointer;border-radius:19px;padding:15px 6px 14px;color:#06203a;display:flex;flex-direction:column;align-items:center;gap:4px;overflow:hidden;transition:transform .07s,box-shadow .07s}
  .aim button::before{content:'';position:absolute;top:2px;left:8%;right:8%;height:42%;background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0));border-radius:0 0 50% 50%;pointer-events:none}
  .aim button:active{transform:translateY(5px)}
  .aim button .ar{font-size:28px;line-height:1;filter:drop-shadow(0 1px 0 rgba(255,255,255,.45))}
  .aim button .lbl{font-size:14px;font-weight:800}
  .aim .b-side{background:linear-gradient(180deg,#73d9ff,#1c9fe6);box-shadow:0 6px 0 #0c6699,0 9px 12px rgba(0,0,0,.4)}
  .aim .b-side:active{box-shadow:0 1px 0 #0c6699,0 2px 5px rgba(0,0,0,.4)}
  .aim .b-mid{background:linear-gradient(180deg,#ffde7a,#f2a516);box-shadow:0 6px 0 #b06f0a,0 9px 12px rgba(0,0,0,.4)}
  .aim .b-mid:active{box-shadow:0 1px 0 #b06f0a,0 2px 5px rgba(0,0,0,.4)}
  /* Buttons / screens */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;border-radius:14px;padding:13px 18px;font-size:15px;font-weight:700;color:#06203a;background:linear-gradient(180deg,#67d3ff,#1aa3e8);box-shadow:0 4px 0 rgba(0,0,0,.3);transition:transform .08s}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.3)}
  .btn.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}
  .btn.gold{background:linear-gradient(180deg,#ffd96b,#f3a91c)}
  .info{background:linear-gradient(180deg,#1c4f86,#13396a);border:1px solid #2f6fb0;border-radius:14px;padding:11px 13px;font-size:13px;line-height:1.55;color:#dceaff;margin:6px 0 4px;text-align:center}
  .seltitle{text-align:center;font-size:16px;font-weight:800;color:var(--gold);margin:8px 0 8px}
  .match{display:flex;align-items:stretch;border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 3px 0 rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.14);min-height:94px}
  .mteam{flex:1;appearance:none;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:12px 6px;color:#fff;transition:transform .1s}
  .mteam:active{transform:scale(.94)}
  .mteam .mf{font-size:30px;line-height:1;filter:drop-shadow(0 2px 2px rgba(0,0,0,.55))}
  .mteam .mn{font-size:15px;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.65)}
  .mteam .mg{font-size:12px;font-weight:600;opacity:.9;text-shadow:0 1px 2px rgba(0,0,0,.65)}
  .mvs{flex:0 0 auto;align-self:center;background:rgba(0,0,0,.5);color:#fff;font-weight:800;font-size:12px;padding:6px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.35);z-index:2}
  .over{position:absolute;inset:0;background:rgba(6,14,28,.82);backdrop-filter:blur(2px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;z-index:20;border-radius:18px;padding:18px}
  .over .big{font-size:46px;font-weight:800;color:var(--gold);line-height:1}
  .scorepanel{position:relative;width:178px;margin:0 auto}
  .scorepanel img{width:100%;display:block}
  .panelbig{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:50px;font-weight:800;color:var(--gold);text-shadow:0 2px 5px rgba(0,0,0,.7)}
  .reward .coin{width:24px;height:24px;vertical-align:-6px;margin-inline-end:5px}
  .over .sub{color:var(--hint);font-size:14px}
  .over .reward{font-size:16px;font-weight:700}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .hint{text-align:center;color:var(--hint);font-size:12px;margin-top:10px}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
  if(tg){ try{ tg.ready(); tg.expand(); }catch(e){} }
  var ASSETS='assets/';
  var matches = [
    [{f:'🇳🇱',n:'هولندا',c:'#ea6d1a',g:8041177},{f:'🇦🇷',n:'الأرجنتين',c:'#6ca7dc',g:5598318}],
    [{f:'🇧🇷',n:'البرازيل',c:'#1f9e4a',g:7233901},{f:'🇩🇪',n:'ألمانيا',c:'#3a3f47',g:6120447}],
    [{f:'🇫🇷',n:'فرنسا',c:'#23449e',g:5904122},{f:'🇪🇸',n:'إسبانيا',c:'#cc1b2c',g:4877650}],
    [{f:'🇵🇹',n:'البرتغال',c:'#b02323',g:4512330},{f:'🇲🇦',n:'المغرب',c:'#11774a',g:3998210}],
    [{f:'🇸🇳',n:'السنغال',c:'#13863c',g:3598518},{f:'🇶🇦',n:'قطر',c:'#7a1b3a',g:2854393}],
    [{f:'🇸🇦',n:'السعودية',c:'#1b7a44',g:3104560},{f:'🇪🇬',n:'مصر',c:'#cc2233',g:2640880}]
  ];
  var team=null, opp=null, score=0, best=0, busy=false, muted=false, audioCtx=null, lastImpact=null;
  function fmt(n){ return n.toLocaleString('en-US'); }
  var app=document.getElementById('app');

  /* ---------- audio ---------- */
  function tone(freq,dur,type,vol){ if(muted) return;
    try{ audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
      var o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=type||'square'; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(vol||0.07,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
      o.start(); o.stop(audioCtx.currentTime+dur);
    }catch(e){}
  }
  function sfx(k){ if(k==='shoot'){tone(280,0.12,'square')} else if(k==='click'){tone(520,0.05,'square',0.05)}
    else if(k==='save'){tone(150,0.28,'sawtooth',0.09)} else if(k==='goal'){tone(523,0.12);setTimeout(function(){tone(659,0.12)},90);setTimeout(function(){tone(784,0.18)},190)} }
  function buzz(t){ if(tg&&tg.HapticFeedback){ try{ tg.HapticFeedback.impactOccurred(t||'medium'); }catch(e){} } }
  window.toggleMute=function(e){ if(e){e.stopPropagation();} muted=!muted; var m=document.getElementById('mute'); if(m) m.textContent=muted?'🔇':'🔊'; };

  /* ---------- confetti ---------- */
  function confetti(){ var c=document.createElement('div'); c.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden';
    document.body.appendChild(c); var cols=['#ffc23d','#37c6ff','#3fe08a','#ff6b6b','#b18bff'];
    for(var i=0;i<70;i++){ var p=document.createElement('div'); var sz=6+Math.random()*8;
      p.style.cssText='position:absolute;top:-20px;left:'+(Math.random()*100)+'%;width:'+sz+'px;height:'+(sz*0.6)+'px;background:'+cols[i%cols.length]+';opacity:.95;border-radius:2px;transform:rotate('+(Math.random()*360)+'deg)';
      c.appendChild(p); animateP(p); }
    setTimeout(function(){c.remove();},2600);
  }
  function animateP(p){ var top=-20,vy=2+Math.random()*3,vx=(Math.random()-0.5)*3,rot=Math.random()*12;
    var r=0; (function step(){ top+=vy; r+=rot; var l=parseFloat(p.style.left); p.style.top=top+'px'; p.style.left=(l+vx*0.06)+'%'; p.style.transform='rotate('+r+'deg)';
      if(top<window.innerHeight+30){ requestAnimationFrame(step); } })();
  }

  /* ---------- screens ---------- */
  function stars(n){ return '★'.repeat(n)+'☆'.repeat(5-n); }

  function selectScreen(){
    hideMain(); team=null; score=0;
    var html='<div class="logo"><img src="'+ASSETS+'logo.png" alt=""><span class="logo-title">ركلات الترجيح</span></div>'
      +'<div class="info">🧤 سجّل أكبر عدد من الأهداف المتتالية! تبدأ سهلة، ويصبح الحارس أسرع مع كل هدف.</div>'
      +'<div class="seltitle">اختر مباراتك — اضغط على منتخبك</div>';
    matches.forEach(function(m,mi){
      var a=m[0], b=m[1];
      html+='<div class="match" style="background:linear-gradient(100deg,'+b.c+' 0 44%,'+a.c+' 56% 100%)">'
        +'<button class="mteam" data-mi="'+mi+'" data-si="0"><span class="mf">'+a.f+'</span><span class="mn">'+a.n+'</span><span class="mg">'+fmt(a.g)+'</span></button>'
        +'<span class="mvs">🆚</span>'
        +'<button class="mteam" data-mi="'+mi+'" data-si="1"><span class="mf">'+b.f+'</span><span class="mn">'+b.n+'</span><span class="mg">'+fmt(b.g)+'</span></button>'
        +'</div>';
    });
    app.innerHTML=html;
    Array.prototype.forEach.call(app.querySelectorAll('.mteam'),function(btn){
      btn.onclick=function(){ sfx('click'); var m=matches[+btn.getAttribute('data-mi')], si=+btn.getAttribute('data-si'); team=m[si]; opp=m[1-si]; score=0; gameScreen(); };
    });
  }

  function hudHTML(){
    return '<div class="hud">'
      +'<div class="pill"><span>'+team.f+'</span><span>'+team.n+'</span></div>'
      +'<div class="pill score-pill" id="sc">'+score+'</div>'
      +'<div class="pill"><span class="lab">الأفضل</span><span id="bs">'+best+'</span></div>'
      +'<button class="mute" id="mute" onclick="toggleMute(event)">'+(muted?'🔇':'🔊')+'</button>'
      +'</div>';
  }
  function sceneHTML(){
    return '<div class="scene" id="scene" style="background-image:url('+ASSETS+'stadium.jpg)">'
      +'<div class="fx" id="fx"></div><div class="ring" id="ring"></div>'
      +'<img class="reticle" id="rL" style="left:30%;top:43%" src="'+ASSETS+'target.png" alt="">'
      +'<img class="reticle" id="rC" style="left:50%;top:30%" src="'+ASSETS+'target.png" alt="">'
      +'<img class="reticle" id="rR" style="left:70%;top:43%" src="'+ASSETS+'target.png" alt="">'
      +'<div class="msg" id="msg"></div>'
      +'<img id="kp" src="'+ASSETS+'keeper.png" alt="">'
      +'<img id="kicker" src="'+ASSETS+'kicker.png" alt="">'
      +'<img id="bl" src="'+ASSETS+'ball.png" alt="">'
      +'<div class="banner" id="banner"><img src="'+ASSETS+'banner.png" alt=""><span id="bannerTxt"></span></div>'
      +'</div>';
  }
  function gameScreen(){
    hideMain(); busy=false;
    app.innerHTML=hudHTML()+sceneHTML()
      +'<div class="aim">'
      +'<button class="b-side" data-d="L"><span class="ar">◄</span><span class="lbl">يسار</span></button>'
      +'<button class="b-mid" data-d="C"><span class="ar">▲</span><span class="lbl">وسط</span></button>'
      +'<button class="b-side" data-d="R"><span class="ar">►</span><span class="lbl">يمين</span></button>'
      +'</div>';
    Array.prototype.forEach.call(app.querySelectorAll('.aim button'),function(b){
      b.onclick=function(){ shoot(b.getAttribute('data-d')); };
    });
  }

  function setMsg(t,c){ var m=document.getElementById('msg'); if(!m) return; m.textContent=t; m.style.color=c||'#fff'; m.classList.remove('show'); void m.offsetWidth; m.classList.add('show'); }
  function showBanner(t){ var b=document.getElementById('banner'), s=document.getElementById('bannerTxt'); if(!b||!s) return; s.textContent=t; b.classList.remove('show'); void b.offsetWidth; b.classList.add('show'); }
  function pulseReticle(dir){ var r=document.getElementById('r'+dir); if(!r) return; r.classList.remove('hot'); void r.offsetWidth; r.classList.add('hot'); setTimeout(function(){ r.classList.remove('hot'); }, 520); }

  function shoot(dir){
    if(busy||!team) return; busy=true; sfx('shoot'); buzz('light');
    var scene=document.getElementById('scene'), kp=document.getElementById('kp'), bl=document.getElementById('bl'), kicker=document.getElementById('kicker');
    var W=scene.clientWidth, H=scene.clientHeight;
    if(kicker){ kicker.classList.add('kick'); setTimeout(function(){kicker.classList.remove('kick');},260); }
    // ball targets (fraction of scene)
    pulseReticle(dir);
    var T={L:{x:0.30,y:0.43},C:{x:0.50,y:0.30},R:{x:0.70,y:0.43}}, base={x:0.50,y:0.78};
    var t=T[dir];
    setTimeout(function(){
      bl.style.transform='translate(calc(-50% + '+((t.x-base.x)*W)+'px), calc(-50% + '+((t.y-base.y)*H)+'px)) scale(0.42)';
    },120);
    // keeper reads with a probability that drops for stronger teams
    var readProb=Math.min(0.10+score*0.05, 0.82), kd;
    if(Math.random()<readProb){ kd=dir; } else { var o=['L','C','R'].filter(function(d){return d!==dir;}); kd=o[Math.floor(Math.random()*o.length)]; }
    if(kd==='L'){ kp.src=ASSETS+'keeper_left.png'; kp.style.transform='translate(calc(-50% - '+(0.19*W)+'px), -52%)'; }
    else if(kd==='R'){ kp.src=ASSETS+'keeper_right.png'; kp.style.transform='translate(calc(-50% + '+(0.19*W)+'px), -52%)'; }
    else { kp.style.transform='translate(-50%, calc(-50% - '+(0.08*H)+'px))'; }
    lastImpact={x:t.x*W, y:t.y*H};
    setTimeout(function(){ resolve(kd===dir); }, 680);
  }

  function resolve(saved){
    var scene=document.getElementById('scene');
    if(saved){
      showBanner('تصدّى! 🧤'); sfx('save'); buzz('heavy');
      if(scene){ scene.classList.add('shake'); setTimeout(function(){scene.classList.remove('shake');},420); }
      if(score>best){ best=score; }
      setTimeout(over,1000);
    } else {
      score++; if(score>best){ best=score; }
      showBanner('هدف! ⚽'); sfx('goal'); buzz('medium'); goalImpact();
      var sc=document.getElementById('sc'); if(sc) sc.textContent=score;
      var bs=document.getElementById('bs'); if(bs) bs.textContent=best;
      if(score>=5){ confetti(); }
      setTimeout(nextKick,950);
    }
  }
  function goalImpact(){
    var scene=document.getElementById('scene'), ring=document.getElementById('ring'), fx=document.getElementById('fx');
    var p=lastImpact||{x:0,y:0};
    if(ring){ ring.style.left=p.x+'px'; ring.style.top=p.y+'px'; ring.classList.remove('go'); void ring.offsetWidth; ring.classList.add('go'); }
    if(fx&&scene){ var px=p.x/scene.clientWidth*100, py=p.y/scene.clientHeight*100;
      fx.style.background='radial-gradient(circle at '+px+'% '+py+'%, rgba(255,255,255,.95), rgba(255,255,255,0) 30%)';
      fx.classList.remove('go'); void fx.offsetWidth; fx.classList.add('go'); }
    if(scene){ scene.classList.remove('shake-sm'); void scene.offsetWidth; scene.classList.add('shake-sm'); setTimeout(function(){scene.classList.remove('shake-sm');},300); }
  }
  function nextKick(){
    var kp=document.getElementById('kp'), bl=document.getElementById('bl');
    if(kp){ kp.src=ASSETS+'keeper.png'; kp.style.transform='translate(-50%,-50%)'; }
    if(bl){ bl.style.transition='none'; bl.style.transform='translate(-50%,-50%)'; void bl.offsetWidth; bl.style.transition=''; }
    busy=false;
  }

  function over(){
    var goalWord = best>10 ? 'سلسلة خارقة! 🔥' : (best>=5?'أداء رائع! 👏':'جولة جيدة');
    var html='<div class="over">'
      +'<div class="sub">'+team.f+' '+team.n+(opp?' 🆚 '+opp.f+' '+opp.n:'')+'</div>'
      +'<div class="scorepanel"><img src="'+ASSETS+'panel.png" alt=""><span class="panelbig">'+best+'</span></div>'
      +'<div class="sub">أهداف متتالية · '+goalWord+'</div>'
      +'<div class="reward"><img class="coin" src="'+ASSETS+'credit.png" alt=""> سجّل أكثر من 10 لتربح رصيد توقّع مجاني</div>'
      +'<div class="row">'
        +'<button class="btn gold" id="again">العب مجددًا</button>'
        +'<button class="btn ghost" id="chg">غيّر المنتخب</button>'
      +'</div>'
      + (tg?'<div class="hint">اضغط «استلم رصيدك» بالأسفل لإرسال نتيجتك 🎁</div>'
           :'<button class="btn" id="sub" style="margin-top:8px">أرسل النتيجة 🎁</button>')
      +'</div>';
    var scene=document.getElementById('scene');
    if(scene){ scene.insertAdjacentHTML('beforeend',html); }
    else { app.innerHTML='<div class="scene">'+html+'</div>'; }
    document.getElementById('again').onclick=function(){ sfx('click'); score=0; gameScreen(); };
    document.getElementById('chg').onclick=function(){ sfx('click'); selectScreen(); };
    var sub=document.getElementById('sub'); if(sub){ sub.onclick=submit; }
    showMain();
  }

  /* ---------- submit (Telegram contract — unchanged) ---------- */
  function submit(){ if(tg){ try{ tg.sendData(JSON.stringify({score:best,team:team?team.n:''})); tg.close(); }catch(e){} } }
  function showMain(){ if(tg&&tg.MainButton){ tg.MainButton.setText('استلم رصيدك 🎁'); tg.MainButton.onClick(submit); tg.MainButton.show(); } }
  function hideMain(){ if(tg&&tg.MainButton){ tg.MainButton.hide(); tg.MainButton.offClick(submit); } }

  selectScreen();
})();
</script>
</body>
</html>
