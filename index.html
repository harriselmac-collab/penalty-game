<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ركلات الترجيح — ماجد للتوقعات</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1f2937);
    --hint: var(--tg-theme-hint-color, #707579);
    --card: var(--tg-theme-secondary-bg-color, #f3f4f6);
    --btn: var(--tg-theme-button-color, #2e7dd6);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif}
  #app{max-width:480px;margin:0 auto;padding:16px}
  h1{font-size:20px;font-weight:600;text-align:center;margin:6px 0 2px}
  .sub{font-size:13px;color:var(--hint);text-align:center;margin:0 0 14px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .team{display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;border:none;background:var(--card);color:var(--text);cursor:pointer;font-size:15px;text-align:right}
  .team>*{pointer-events:none}
  .flag{font-size:26px;line-height:1}
  .tname{font-weight:600}
  .tpow{font-size:12px;color:var(--hint)}
  .hud{display:flex;justify-content:space-between;align-items:center;margin:0 0 10px;font-size:14px}
  .msg{text-align:center;height:26px;font-size:18px;font-weight:600;margin:6px 0}
  .aim{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
  .aim button{padding:14px;border-radius:14px;border:none;background:var(--card);color:var(--text);font-size:16px;font-weight:600;cursor:pointer}
  .over{text-align:center;padding:18px 8px}
  .over .big{font-size:46px;font-weight:700;margin:4px 0}
  .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}
  .row button{padding:12px 16px;border-radius:14px;border:none;background:var(--card);color:var(--text);font-size:15px;font-weight:600;cursor:pointer}
  @keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
  .pop{display:inline-block;animation:pop .35s ease-out}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  if(tg){ try{ tg.ready(); tg.expand(); }catch(e){} }
  var app = document.getElementById('app');
  var teams = [
    {f:'🇸🇦',n:'السعودية',s:2},{f:'🇪🇬',n:'مصر',s:2},{f:'🇶🇦',n:'قطر',s:2},
    {f:'🇲🇦',n:'المغرب',s:3},{f:'🇸🇳',n:'السنغال',s:3},{f:'🇳🇱',n:'هولندا',s:4},
    {f:'🇵🇹',n:'البرتغال',s:4},{f:'🇪🇸',n:'إسبانيا',s:4},{f:'🇩🇪',n:'ألمانيا',s:4},
    {f:'🇦🇷',n:'الأرجنتين',s:5},{f:'🇧🇷',n:'البرازيل',s:5},{f:'🇫🇷',n:'فرنسا',s:5}
  ];
  var team=null, score=0, best=0, busy=false;

  function hideMain(){ if(tg&&tg.MainButton){ tg.MainButton.hide(); tg.MainButton.offClick(submit); } }
  function showMain(){ if(tg&&tg.MainButton){ tg.MainButton.setText('أرسل أفضل نتيجة 🏆'); tg.MainButton.onClick(submit); tg.MainButton.show(); } }
  function submit(){ if(tg){ try{ tg.sendData(JSON.stringify({score:best,team:team?team.n:''})); tg.close(); }catch(e){} } }
  function buzz(t){ if(tg&&tg.HapticFeedback){ try{ tg.HapticFeedback.impactOccurred(t||'medium'); }catch(e){} } }
  function setMsg(t,c){ var m=document.getElementById('msg'); if(m){ m.innerHTML=t?'<span class="pop">'+t+'</span>':''; m.style.color=c||'var(--text)'; } }

  function selectScreen(){
    hideMain();
    var h='<h1>ركلات الترجيح</h1><div class="sub">اختر منتخبك — كلما كان أقوى كان التسجيل أسهل</div><div class="grid">';
    teams.forEach(function(t,i){
      h+='<button class="team" data-i="'+i+'"><span class="flag">'+t.f+'</span><span><span class="tname">'+t.n+'</span><br><span class="tpow">القوة '+t.s+'/5</span></span></button>';
    });
    h+='</div>';
    app.innerHTML=h;
    Array.prototype.forEach.call(app.querySelectorAll('.team'),function(b){
      b.onclick=function(){ team=teams[+b.getAttribute('data-i')]; score=0; gameScreen(); };
    });
  }
  function crowd(){var s='',i,c=['#e74c3c','#f1c40f','#3498db','#2ecc71','#e67e22','#9b59b6','#fff'];for(i=34;i<286;i+=11){s+='<circle cx="'+i+'" cy="'+(20+(i%2?0:4))+'" r="3.4" fill="'+c[i%c.length]+'"/>';}return s;}
  function netG(){var s='',i;for(i=54;i<272;i+=15){s+='<line x1="'+i+'" y1="44" x2="'+i+'" y2="150" stroke="#fff" stroke-width="0.6" opacity="0.5"/>';}for(i=52;i<150;i+=13){s+='<line x1="46" y1="'+i+'" x2="274" y2="'+i+'" stroke="#fff" stroke-width="0.6" opacity="0.5"/>';}return s;}
  function keeperSVG(){return '<g id="kp" style="transition:transform .45s ease-out;transform-box:fill-box;transform-origin:center;">'
    +'<ellipse cx="160" cy="151" rx="26" ry="6" fill="rgba(0,0,0,0.18)"/>'
    +'<line x1="148" y1="104" x2="129" y2="86" stroke="#1f2937" stroke-width="11" stroke-linecap="round"/><line x1="172" y1="104" x2="191" y2="86" stroke="#1f2937" stroke-width="11" stroke-linecap="round"/>'
    +'<line x1="148" y1="104" x2="129" y2="86" stroke="#ff7a00" stroke-width="7" stroke-linecap="round"/><line x1="172" y1="104" x2="191" y2="86" stroke="#ff7a00" stroke-width="7" stroke-linecap="round"/>'
    +'<rect x="151" y="128" width="7" height="22" rx="3" fill="#2b3a67"/><rect x="162" y="128" width="7" height="22" rx="3" fill="#2b3a67"/>'
    +'<rect x="145" y="99" width="30" height="36" rx="13" fill="#ff7a00" stroke="#1f2937" stroke-width="2.5"/>'
    +'<circle cx="129" cy="86" r="8" fill="#2e7dd6" stroke="#1f2937" stroke-width="2.5"/><circle cx="191" cy="86" r="8" fill="#2e7dd6" stroke="#1f2937" stroke-width="2.5"/>'
    +'<circle cx="160" cy="89" r="12.5" fill="#f0c9a3" stroke="#1f2937" stroke-width="2.5"/>'
    +'<path d="M148,88 A12.5,12.5 0 0,1 172,88 Z" fill="#4a3526"/>'
    +'<circle cx="155.5" cy="89" r="2.4" fill="#fff"/><circle cx="164.5" cy="89" r="2.4" fill="#fff"/><circle cx="155.8" cy="89.3" r="1.1" fill="#1f2937"/><circle cx="164.8" cy="89.3" r="1.1" fill="#1f2937"/>'
    +'<path d="M155,95 Q160,99 165,95" stroke="#1f2937" stroke-width="1.6" fill="none" stroke-linecap="round"/></g>';}
  function ballSVG(){return '<g id="bl" style="transition:transform .55s cubic-bezier(.45,0,.2,1);transform-box:fill-box;transform-origin:center;">'
    +'<ellipse cx="160" cy="236" rx="11" ry="4" fill="rgba(0,0,0,0.18)"/>'
    +'<circle cx="160" cy="225" r="12" fill="#fff" stroke="#1f2937" stroke-width="2.4"/>'
    +'<polygon points="160,219 165.5,223 163.5,229.5 156.5,229.5 154.5,223" fill="#1f2937"/>'
    +'<line x1="160" y1="219" x2="160" y2="214" stroke="#1f2937" stroke-width="1.4"/><line x1="165.5" y1="223" x2="170" y2="221" stroke="#1f2937" stroke-width="1.4"/><line x1="163.5" y1="229.5" x2="166" y2="234" stroke="#1f2937" stroke-width="1.4"/><line x1="156.5" y1="229.5" x2="154" y2="234" stroke="#1f2937" stroke-width="1.4"/><line x1="154.5" y1="223" x2="150" y2="221" stroke="#1f2937" stroke-width="1.4"/></g>';}
  function scene(){return '<svg viewBox="0 0 320 250" width="100%" style="display:block;border-radius:14px">'
    +'<rect x="0" y="0" width="320" height="170" fill="#bfe6ff"/><circle cx="44" cy="34" r="16" fill="#ffd54a"/>'
    +'<g fill="#fff"><ellipse cx="250" cy="30" rx="26" ry="11"/><ellipse cx="232" cy="34" rx="16" ry="9"/><ellipse cx="95" cy="22" rx="20" ry="9"/></g>'
    +'<rect x="30" y="14" width="260" height="14" rx="3" fill="#6b7280"/>'+crowd()
    +'<rect x="0" y="160" width="320" height="90" fill="#43a047"/>'
    +'<rect x="40" y="160" width="40" height="90" fill="#4caf50"/><rect x="120" y="160" width="40" height="90" fill="#4caf50"/><rect x="200" y="160" width="40" height="90" fill="#4caf50"/><rect x="280" y="160" width="40" height="90" fill="#4caf50"/>'
    +'<rect x="46" y="44" width="228" height="116" fill="#1f5d22" opacity="0.55"/>'+netG()
    +'<rect x="40" y="38" width="9" height="118" rx="4" fill="#fff"/><rect x="271" y="38" width="9" height="118" rx="4" fill="#fff"/><rect x="40" y="36" width="240" height="9" rx="4" fill="#fff"/>'
    +keeperSVG()+'<circle cx="160" cy="236" r="3" fill="#fff" opacity="0.9"/>'+ballSVG()+'</svg>';}
  function gameScreen(){
    hideMain();
    app.innerHTML='<div class="hud"><span>'+team.f+' '+team.n+'</span><span>الأهداف: <b id="sc">'+score+'</b></span><span style="color:var(--hint)">الأفضل: '+best+'</span></div>'
      +scene()+'<div class="msg" id="msg"></div>'
      +'<div class="aim"><button data-d="L">◄ يسار</button><button data-d="C">▲ وسط</button><button data-d="R">يمين ►</button></div>';
    Array.prototype.forEach.call(app.querySelectorAll('.aim button'),function(b){ b.onclick=function(){ shoot(b.getAttribute('d')||b.getAttribute('data-d')); }; });
  }
  function shoot(dir){
    if(busy||!team) return; busy=true; setMsg(''); buzz('light');
    var tx=dir==='L'?85:dir==='R'?235:160;
    document.getElementById('bl').style.transform='translate('+(tx-160)+'px,'+(95-225)+'px)';
    var readProb=0.15+(5-team.s)*0.06, kd;
    if(Math.random()<readProb){ kd=dir; } else { var o=['L','C','R'].filter(function(d){return d!==dir;}); kd=o[Math.floor(Math.random()*o.length)]; }
    var k=document.getElementById('kp');
    if(kd==='L') k.style.transform='translate(-55px,-6px) rotate(-16deg)';
    else if(kd==='R') k.style.transform='translate(55px,-6px) rotate(16deg)';
    else k.style.transform='translate(0,-12px)';
    setTimeout(function(){ resolve(kd===dir); }, 650);
  }
  function resolve(saved){
    if(saved){ setMsg('تصدّى الحارس!','#c0392b'); buzz('heavy'); setTimeout(gameOver,800); }
    else{ score++; var sc=document.getElementById('sc'); if(sc)sc.textContent=score; setMsg('هدف!','#1e7d32'); buzz('medium');
      setTimeout(function(){ var b=document.getElementById('bl'),k=document.getElementById('kp'); if(b)b.style.transform='translate(0,0)'; if(k)k.style.transform='translate(0,0)'; busy=false; setMsg(''); }, 800); }
  }
  function gameOver(){
    best=Math.max(best,score);
    app.innerHTML='<div class="over"><div style="font-size:20px;font-weight:600">انتهت الجولة</div>'
      +'<div style="font-size:14px;color:var(--hint);margin-top:6px">سجّلت مع '+team.f+' '+team.n+'</div>'
      +'<div class="big">'+score+'</div>'
      +'<div style="font-size:13px;color:var(--hint)">أهداف متتالية · أفضل نتيجة: '+best+'</div>'
      +'<div class="row"><button id="again">العب مجددًا</button><button id="chg">غيّر المنتخب</button>'
      + (tg?'':'<button id="sub">أرسل النتيجة</button>') +'</div>'
      + (tg?'<div style="font-size:12px;color:var(--hint);margin-top:12px">اضغط الزر بالأسفل لإرسال نتيجتك إلى لوحة المتصدّرين</div>':'<div style="font-size:12px;color:var(--hint);margin-top:12px">معاينة — داخل تيليجرام تُرسَل النتيجة للوحة المتصدّرين</div>')
      +'</div>';
    document.getElementById('again').onclick=function(){ score=0; gameScreen(); };
    document.getElementById('chg').onclick=function(){ score=0; selectScreen(); };
    var sub=document.getElementById('sub'); if(sub) sub.onclick=submit;
    showMain();
  }
  selectScreen();
})();
</script>
</body>
</html>
